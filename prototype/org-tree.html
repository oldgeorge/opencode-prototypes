<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OG.Admin - Org Tree</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="p-3">
  <div class="container-fluid">
    <div class="card">
      <div class="card-header">Organization Tree</div>
      <div class="card-body">
        <ul class="tree" id="orgTree" style="padding-left:0;">
          <li>
            <span>Global Corp</span>
            <ul class="tree-children" style="padding-left:20px;">
              <li>Headquarters</li>
              <li>Region A
                <ul class="tree-children" style="padding-left:20px;">
                  <li>Sales</li>
                  <li>Engineering</li>
                </ul>
              </li>
              <li>Region B</li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </div>
  <script>
    // Simple expand/collapse for tree
    document.addEventListener('DOMContentLoaded', () => {
      const root = document.getElementById('orgTree');
      root.querySelectorAll('li').forEach(li => {
        if (li.querySelector('ul')) {
          li.style.cursor = 'pointer';
          li.addEventListener('click', (e) => {
            // Avoid toggling on clicks on children
            if (e.target !== li) return;
            const sub = li.querySelector('ul');
            if (sub) {
              sub.style.display = sub.style.display === 'none' ? 'block' : 'none';
            }
          });
          // Start collapsed for nested lists
          const sub = li.querySelector('ul');
          if (sub) sub.style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
