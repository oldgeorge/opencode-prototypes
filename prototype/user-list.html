<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OG.Admin - 用户管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    .table-wrap { max-height: calc(100vh - 320px); overflow-y: auto; }
    .table thead th { position: sticky; top: 0; background: #f8f9fa; z-index: 1; }
    .btn-icon { padding: 4px 8px; font-size: 14px; }
    .status-active { color: #198754; }
    .status-inactive { color: #dc3545; }
    .search-box { max-width: 400px; }
    .modal-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .modal-header .btn-close { filter: invert(1); }
  </style>
</head>
<body class="p-3">
  <div class="container-fluid">
    <!-- 页面标题 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0"><i class="bi bi-people me-2"></i>用户管理</h4>
      <button class="btn btn-primary" onclick="openAddModal()">
        <i class="bi bi-plus-circle me-1"></i>新增用户
      </button>
    </div>

    <!-- 用户列表卡片 -->
    <div class="card">
      <div class="card-header bg-white">
        <div class="row align-items-center">
          <div class="col-md-6">
            <div class="input-group search-box">
              <input type="text" class="form-control" id="searchInput" placeholder="搜索用户名、姓名或邮箱..." oninput="doSearch()">
              <button class="btn btn-outline-secondary" type="button" onclick="doSearch()">
                <i class="bi bi-search"></i>
              </button>
            </div>
          </div>
          <div class="col-md-6 text-end">
            <span class="text-muted">共 <strong id="totalCount">0</strong> 条记录</span>
          </div>
        </div>
      </div>
      <div class="card-body p-0">
        <div class="table-wrap">
          <table class="table table-striped table-hover mb-0">
            <thead>
              <tr>
                <th scope="col" style="width:60px;">ID</th>
                <th scope="col">用户名</th>
                <th scope="col">真实姓名</th>
                <th scope="col">邮箱</th>
                <th scope="col">手机</th>
                <th scope="col">所属组织</th>
                <th scope="col">角色</th>
                <th scope="col" style="width:80px;">状态</th>
                <th scope="col" style="width:180px;">操作</th>
              </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
          </table>
        </div>
      </div>
      <div class="card-footer bg-white">
        <nav aria-label="分页">
          <ul class="pagination justify-content-end mb-0" id="pagination"></ul>
        </nav>
      </div>
    </div>
  </div>

  <!-- 新增/编辑用户模态框 -->
  <div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">
            <i class="bi bi-person-plus me-2"></i>新增用户
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="userForm">
            <input type="hidden" id="userId">
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">用户名 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="username" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">真实姓名</label>
                <input type="text" class="form-control" id="realName">
              </div>
            </div>
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">邮箱</label>
                <input type="email" class="form-control" id="email">
              </div>
              <div class="col-md-6">
                <label class="form-label">手机</label>
                <input type="tel" class="form-control" id="phone">
              </div>
            </div>
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">密码 <span class="text-danger" id="pwdRequired">*</span></label>
                <input type="password" class="form-control" id="password" placeholder="请输入密码">
              </div>
              <div class="col-md-6">
                <label class="form-label">所属组织</label>
                <select class="form-select" id="orgId">
                  <option value="">请选择</option>
                  <option value="1">技术部</option>
                  <option value="2">运营部</option>
                  <option value="3">市场部</option>
                </select>
              </div>
            </div>
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">角色 <span class="text-danger">*</span></label>
                <select class="form-select" id="roleId" required>
                  <option value="">请选择</option>
                  <option value="1">超级管理员</option>
                  <option value="2">管理员</option>
                  <option value="3">普通用户</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">状态</label>
                <select class="form-select" id="status">
                  <option value="1">启用</option>
                  <option value="0">禁用</option>
                </select>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" onclick="saveUser()">
            <i class="bi bi-check-circle me-1"></i>保存
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 删除确认模态框 -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title"><i class="bi bi-exclamation-triangle me-2"></i>确认删除</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p>确定要删除用户 <strong id="deleteUserName"></strong> 吗？</p>
          <p class="text-muted small mb-0">此操作不可恢复</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-danger" onclick="confirmDelete()">
            <i class="bi bi-trash me-1"></i>删除
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 模拟用户数据
    let users = [
      {id:1, username:'admin', realName:'系统管理员', email:'admin@example.com', phone:'13800138000', org:'技术部', role:'超级管理员', status:1},
      {id:2, username:'zhangsan', realName:'张三', email:'zhangsan@example.com', phone:'13800138001', org:'技术部', role:'管理员', status:1},
      {id:3, username:'lisi', realName:'李四', email:'lisi@example.com', phone:'13800138002', org:'运营部', role:'普通用户', status:1},
      {id:4, username:'wangwu', realName:'王五', email:'wangwu@example.com', phone:'13800138003', org:'市场部', role:'普通用户', status:0},
      {id:5, username:'zhaoliu', realName:'赵六', email:'zhaoliu@example.com', phone:'13800138004', org:'技术部', role:'管理员', status:1},
      {id:6, username:'sunqi', realName:'孙七', email:'sunqi@example.com', phone:'13800138005', org:'运营部', role:'普通用户', status:1},
      {id:7, username:'zhouba', realName:'周八', email:'zhouba@example.com', phone:'13800138006', org:'市场部', role:'普通用户', status:1},
      {id:8, username:'wujiu', realName:'吴九', email:'wujiu@example.com', phone:'13800138007', org:'技术部', role:'管理员', status:0},
    ];

    let currentPage = 1;
    const pageSize = 5;
    let filteredUsers = [...users];
    let deleteUserId = null;
    let userModal = null;
    let deleteModal = null;

    document.addEventListener('DOMContentLoaded', () => {
      userModal = new bootstrap.Modal(document.getElementById('userModal'));
      deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
      renderTable();
    });

    function renderTable() {
      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageUsers = filteredUsers.slice(start, end);
      
      const tbody = document.getElementById('userTableBody');
      tbody.innerHTML = '';
      
      if (pageUsers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted py-4">暂无数据</td></tr>';
        return;
      }

      pageUsers.forEach(user => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${user.id}</td>
          <td><strong>${user.username}</strong></td>
          <td>${user.realName}</td>
          <td>${user.email}</td>
          <td>${user.phone}</td>
          <td>${user.org}</td>
          <td><span class="badge bg-info">${user.role}</span></td>
          <td>
            <span class="${user.status === 1 ? 'status-active' : 'status-inactive'}">
              <i class="bi bi-${user.status === 1 ? 'check-circle-fill' : 'x-circle-fill'}"></i>
              ${user.status === 1 ? '启用' : '禁用'}
            </span>
          </td>
          <td>
            <button class="btn btn-sm btn-outline-primary btn-icon" onclick="editUser(${user.id})" title="编辑">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-outline-${user.status === 1 ? 'warning' : 'success'} btn-icon" onclick="toggleStatus(${user.id})" title="${user.status === 1 ? '禁用' : '启用'}">
              <i class="bi bi-${user.status === 1 ? 'slash-circle' : 'check-circle'}"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger btn-icon" onclick="deleteUser(${user.id})" title="删除">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('totalCount').textContent = filteredUsers.length;
      renderPagination();
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredUsers.length / pageSize) || 1;
      const pagination = document.getElementById('pagination');
      pagination.innerHTML = '';

      // 上一页
      const prevLi = document.createElement('li');
      prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
      prevLi.innerHTML = `<span class="page-link" onclick="goPage(${currentPage - 1})">上一页</span>`;
      pagination.appendChild(prevLi);

      // 页码
      for (let i = 1; i <= totalPages; i++) {
        const li = document.createElement('li');
        li.className = `page-item ${i === currentPage ? 'active' : ''}`;
        li.innerHTML = `<span class="page-link" onclick="goPage(${i})">${i}</span>`;
        pagination.appendChild(li);
      }

      // 下一页
      const nextLi = document.createElement('li');
      nextLi.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
      nextLi.innerHTML = `<span class="page-link" onclick="goPage(${currentPage + 1})">下一页</span>`;
      pagination.appendChild(nextLi);
    }

    function goPage(page) {
      const totalPages = Math.ceil(filteredUsers.length / pageSize) || 1;
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderTable();
    }

    function doSearch() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!q) {
        filteredUsers = [...users];
      } else {
        filteredUsers = users.filter(u => 
          u.username.toLowerCase().includes(q) ||
          u.realName.toLowerCase().includes(q) ||
          u.email.toLowerCase().includes(q)
        );
      }
      currentPage = 1;
      renderTable();
    }

    function openAddModal() {
      document.getElementById('userForm').reset();
      document.getElementById('userId').value = '';
      document.getElementById('modalTitle').innerHTML = '<i class="bi bi-person-plus me-2"></i>新增用户';
      document.getElementById('password').required = true;
      document.getElementById('pwdRequired').style.display = 'inline';
      userModal.show();
    }

    function editUser(id) {
      const user = users.find(u => u.id === id);
      if (!user) return;

      document.getElementById('userId').value = user.id;
      document.getElementById('username').value = user.username;
      document.getElementById('realName').value = user.realName;
      document.getElementById('email').value = user.email;
      document.getElementById('phone').value = user.phone;
      document.getElementById('password').value = '';
      document.getElementById('password').required = false;
      document.getElementById('pwdRequired').style.display = 'none';
      document.getElementById('status').value = user.status.toString();

      document.getElementById('modalTitle').innerHTML = '<i class="bi bi-pencil-square me-2"></i>编辑用户';
      userModal.show();
    }

    function saveUser() {
      const form = document.getElementById('userForm');
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const id = document.getElementById('userId').value;
      const userData = {
        username: document.getElementById('username').value,
        realName: document.getElementById('realName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        status: parseInt(document.getElementById('status').value)
      };

      if (id) {
        // 编辑
        const idx = users.findIndex(u => u.id === parseInt(id));
        if (idx !== -1) {
          users[idx] = { ...users[idx], ...userData };
        }
      } else {
        // 新增
        const newId = Math.max(...users.map(u => u.id)) + 1;
        users.push({
          id: newId,
          ...userData,
          org: '技术部',
          role: '普通用户'
        });
      }

      filteredUsers = [...users];
      userModal.hide();
      renderTable();
      
      // 显示成功提示
      showToast(id ? '用户更新成功' : '用户添加成功');
    }

    function deleteUser(id) {
      const user = users.find(u => u.id === id);
      if (!user) return;
      deleteUserId = id;
      document.getElementById('deleteUserName').textContent = user.username + ' (' + user.realName + ')';
      deleteModal.show();
    }

    function confirmDelete() {
      if (deleteUserId !== null) {
        users = users.filter(u => u.id !== deleteUserId);
        filteredUsers = [...users];
        deleteUserId = null;
        deleteModal.hide();
        renderTable();
        showToast('用户删除成功');
      }
    }

    function toggleStatus(id) {
      const user = users.find(u => u.id === id);
      if (user) {
        user.status = user.status === 1 ? 0 : 1;
        filteredUsers = [...users];
        renderTable();
        showToast(`用户${user.status === 1 ? '启用' : '禁用'}成功`);
      }
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'position-fixed bottom-0 end-0 p-3';
      toast.innerHTML = `
        <div class="toast show align-items-center text-white bg-success border-0" role="alert">
          <div class="d-flex">
            <div class="toast-body"><i class="bi bi-check-circle me-2"></i>${message}</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
          </div>
        </div>
      `;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  </script>
</body>
</html>
