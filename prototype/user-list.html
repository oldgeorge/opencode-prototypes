<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OG.Admin - User List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .table-wrap { max-height: 60vh; overflow: auto; }
  </style>
</head>
<body class="p-3">
  <div class="container-fluid">
    <div class="card">
      <div class="card-header">User List</div>
      <div class="card-body">
        <div class="row mb-3">
          <div class="col-8">
            <div class="input-group">
              <input id="search" type="text" class="form-control" placeholder="Search by username or email...">
              <button class="btn btn-outline-secondary" type="button" onclick="doSearch()">Search</button>
            </div>
          </div>
          <div class="col-4 text-end">
            <span class="text-muted">Total: 6</span>
          </div>
        </div>
        <div class="table-wrap">
          <table class="table table-striped mb-0" id="userTable">
            <thead>
              <tr>
                <th scope="col">ID</th>
                <th scope="col">Username</th>
                <th scope="col">Email</th>
                <th scope="col">Role</th>
                <th scope="col">Status</th>
                <th scope="col">Actions</th>
              </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
          </table>
        </div>
        <nav aria-label="Page navigation example" class="mt-3">
          <ul class="pagination justify-content-end mb-0">
            <li class="page-item disabled"><span class="page-link">Previous</span></li>
            <li class="page-item active" aria-current="page"><span class="page-link">1</span></li>
            <li class="page-item"><span class="page-link">2</span></li>
            <li class="page-item"><span class="page-link">3</span></li>
            <li class="page-item"><span class="page-link">Next</span></li>
          </ul>
        </nav>
      </div>
    </div>
  </div>
  <script>
    // Mock data
    const users = [
      {id:1, username:'alice', email:'alice@example.com', role:'Admin', status:'Active'},
      {id:2, username:'bob', email:'bob@example.com', role:'Editor', status:'Active'},
      {id:3, username:'carol', email:'carol@example.com', role:'Viewer', status:'Inactive'},
      {id:4, username:'dave', email:'dave@example.com', role:'Editor', status:'Active'},
      {id:5, username:'eve', email:'eve@example.com', role:'Viewer', status:'Active'},
      {id:6, username:'frank', email:'frank@example.com', role:'Admin', status:'Active'}
    ];
    function render(rows){
      const t = document.getElementById('userTableBody');
      t.innerHTML = '';
      for(const r of rows){
        const tr = document.createElement('tr');
        tr.innerHTML = `<th scope="row">${r.id}</th><td>${r.username}</td><td>${r.email}</td><td>${r.role}</td><td>${r.status}</td><td><button class="btn btn-sm btn-outline-primary">Edit</button> <button class="btn btn-sm btn-outline-secondary">Disable</button></td>`;
        t.appendChild(tr);
      }
    }
    function doSearch(){
      const q = (document.getElementById('search').value || '').toLowerCase();
      if(!q){ render(users); return; }
      const filtered = users.filter(u => u.username.includes(q) || u.email.includes(q));
      render(filtered);
    }
    document.addEventListener('DOMContentLoaded', () => {
      render(users);
    });
  </script>
</body>
</html>
