<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OG.Admin - Role List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="p-3">
  <div class="container-fluid">
    <div class="card">
      <div class="card-header">Role Management</div>
      <div class="card-body">
        <table class="table table-bordered">
          <thead>
            <tr>
              <th>Role</th>
              <th>Permissions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Admin</td>
              <td>
                <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" checked> <label class="form-check-label">Read</label></div>
                <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" checked> <label class="form-check-label">Create</label></div>
                <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" checked> <label class="form-check-label">Update</label></div>
                <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" checked> <label class="form-check-label">Delete</label></div>
              </td>
            </tr>
            <tr>
              <td>Editor</td>
              <td>
                <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" checked> <label class="form-check-label">Read</label></div>
                <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox"> <label class="form-check-label">Create</label></div>
                <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" checked> <label class="form-check-label">Update</label></div>
                <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox"> <label class="form-check-label">Delete</label></div>
              </td>
            </tr>
            <tr>
              <td>Viewer</td>
              <td>
                <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" checked> <label class="form-check-label">Read</label></div>
                <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" disabled> <label class="form-check-label">Create</label></div>
                <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" disabled> <label class="form-check-label">Update</label></div>
                <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" disabled> <label class="form-check-label">Delete</label></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
