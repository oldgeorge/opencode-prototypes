<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OG.Admin - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="d-flex align-items-center bg-light" style="min-height:100vh;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-8 col-md-6 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <div class="d-flex align-items-center mb-3">
              <span class="logo">OG.Admin</span>
            </div>
            <h5 class="card-title mb-3">Sign in</h5>
            <form id="loginForm" onsubmit="handleLogin(event)">
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" placeholder="Enter username" required>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter password" required>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-primary">Login</button>
              </div>
            </form>
            <div class="mt-3 text-muted" style="font-size:12px;">This is a static prototype for demonstration purposes.</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    // Redirect to main if already logged in
    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('ogadmin_loggedIn') === 'true') {
        location.href = 'main.html';
      }
    });
    function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      if (user && pass) {
        localStorage.setItem('ogadmin_loggedIn', 'true');
        localStorage.setItem('ogadmin_user', user);
        location.href = 'main.html';
      } else {
        alert('Please enter username and password.');
      }
    }
  </script>
</body>
</html>
