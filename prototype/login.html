<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OG.Admin - 系统登录</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-container {
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    .form-control {
      border-radius: 10px;
      padding: 12px 16px;
      border: 2px solid #e9ecef;
      transition: all 0.3s ease;
    }
    .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }
    .btn-primary {
      border-radius: 10px;
      padding: 12px;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .form-label {
      font-weight: 500;
      color: #495057;
      margin-bottom: 8px;
    }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .remember-me input {
      width: 18px;
      height: 18px;
      accent-color: #667eea;
    }
    .error-msg {
      color: #dc3545;
      font-size: 13px;
      margin-top: 8px;
      display: none;
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .input-group-text {
      border-radius: 10px 0 0 10px;
      border: 2px solid #e9ecef;
      border-right: none;
      background: #f8f9fa;
    }
    .input-with-icon {
      display: flex;
      align-items: center;
    }
    .input-with-icon .form-control {
      border-radius: 0 10px 10px 0;
    }
  </style>
</head>
<body class="d-flex align-items-center bg-light" style="min-height:100vh;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-8 col-md-6 col-lg-4">
        <div class="login-container">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <div class="d-flex align-items-center mb-4">
                <span class="logo">OG.Admin</span>
                <span style="color:#666;margin-left:8px;">管理系统</span>
              </div>
              <h5 class="card-title mb-4" style="color:#333;">用户登录</h5>
              <form id="loginForm">
                <div class="mb-3">
                  <label for="username" class="form-label">用户名</label>
                  <div class="input-group">
                    <span class="input-group-text">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                      </svg>
                    </span>
                    <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
                  </div>
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">密码</label>
                  <div class="input-group">
                    <span class="input-group-text">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                      </svg>
                    </span>
                    <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                  </div>
                </div>
                <div class="mb-3 remember-me">
                  <input type="checkbox" id="rememberMe">
                  <label for="rememberMe" style="color:#666;font-weight:normal;cursor:pointer;">记住密码</label>
                </div>
                <div class="error-msg" id="errorMsg"></div>
                <div class="d-grid mt-4">
                  <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span id="btnText">登 录</span>
                  </button>
                </div>
              </form>
              <div class="mt-4 text-center" style="font-size:12px;color:#999;">
                <p style="margin:0;">演示账号：admin / admin123</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 页面加载时检查是否已登录
    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('ogadmin_loggedIn') === 'true') {
        location.href = 'main.html';
        return;
      }
      // 如果记住密码，填充用户名
      const savedUser = localStorage.getItem('ogadmin_username');
      if (savedUser) {
        document.getElementById('username').value = savedUser;
        document.getElementById('rememberMe').checked = true;
      }
    });

    // 显示错误信息
    function showError(msg) {
      const errorEl = document.getElementById('errorMsg');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      setTimeout(() => {
        errorEl.style.display = 'none';
      }, 3000);
    }

    // 设置按钮loading状态
    function setLoading(loading) {
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText');
      if (loading) {
        btn.disabled = true;
        btnText.innerHTML = '<span class="spinner"></span>登录中...';
      } else {
        btn.disabled = false;
        btnText.textContent = '登 录';
      }
    }

    // 模拟登录验证
    function validateLogin(username, password) {
      // 演示账号验证
      if (username === 'admin' && password === 'admin123') {
        return { success: true, realName: '系统管理员' };
      }
      // 其他账号模拟验证（实际项目中应调用API）
      if (username && password) {
        return { success: true, realName: username };
      }
      return { success: false, message: '用户名或密码错误' };
    }

    // 处理登录提交
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      // 清除之前的错误
      document.getElementById('errorMsg').style.display = 'none';

      // 简单验证
      if (!username) {
        showError('请输入用户名');
        return;
      }
      if (!password) {
        showError('请输入密码');
        return;
      }

      // 显示loading状态
      setLoading(true);

      // 模拟网络延迟
      await new Promise(resolve => setTimeout(resolve, 800));

      // 验证登录
      const result = validateLogin(username, password);

      if (result.success) {
        // 保存登录状态
        localStorage.setItem('ogadmin_loggedIn', 'true');
        localStorage.setItem('ogadmin_user', username);
        localStorage.setItem('ogadmin_realName', result.realName);
        
        // 记住密码
        if (rememberMe) {
          localStorage.setItem('ogadmin_username', username);
        } else {
          localStorage.removeItem('ogadmin_username');
        }

        // 登录成功提示
        const btnText = document.getElementById('btnText');
        btnText.innerHTML = '✓ 登录成功';
        
        // 延迟跳转，让用户看到成功提示
        setTimeout(() => {
          location.href = 'main.html';
        }, 300);
      } else {
        setLoading(false);
        showError(result.message || '登录失败，请重试');
      }
    });

    // 输入时清除错误提示
    document.getElementById('username').addEventListener('input', () => {
      document.getElementById('errorMsg').style.display = 'none';
    });
    document.getElementById('password').addEventListener('input', () => {
      document.getElementById('errorMsg').style.display = 'none';
    });
  </script>
</body>
</html>
