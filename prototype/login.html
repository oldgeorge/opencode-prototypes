<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OG.Admin - 系统登录</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-main);
      background-image: 
        radial-gradient(at 0% 0%, rgba(102,126,234,0.15) 0%, transparent 50%),
        radial-gradient(at 100% 100%, rgba(118,75,162,0.15) 0%, transparent 50%);
    }
    
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }
    
    .login-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      animation: fadeIn 0.5s ease;
    }
    
    .login-header {
      padding: 32px 24px 24px;
      text-align: center;
      background: var(--gradient);
      color: white;
    }
    
    .login-logo {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .login-subtitle {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .login-body {
      padding: 32px 24px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .input-group {
      display: flex;
      align-items: center;
      background: var(--bg-main);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 0 14px;
      transition: all 0.2s;
    }
    
    .input-group:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
    }
    
    .input-icon {
      margin-right: 10px;
      font-size: 18px;
      opacity: 0.5;
    }
    
    .input-group input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 12px 0;
      font-size: 14px;
      outline: none;
    }
    
    .input-group input::placeholder {
      color: var(--text-light);
    }
    
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      font-size: 13px;
    }
    
    .remember-me {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    
    .remember-me input {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
    }
    
    .forgot-link {
      color: var(--primary);
      text-decoration: none;
    }
    
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--gradient);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(102,126,234,0.35);
    }
    
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(102,126,234,0.45);
    }
    
    .btn-login:active {
      transform: translateY(0);
    }
    
    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    
    .error-msg {
      color: #dc2626;
      font-size: 13px;
      margin-top: 8px;
      display: none;
      animation: shake 0.5s ease;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .login-footer {
      text-align: center;
      padding: 16px 24px 24px;
      font-size: 12px;
      color: var(--text-light);
    }
    
    .demo-hint {
      background: var(--bg-main);
      padding: 12px 16px;
      border-radius: var(--radius-md);
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .demo-hint strong {
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">OG.Admin</div>
        <div class="login-subtitle">管理系统</div>
      </div>
      
      <div class="login-body">
        <form id="loginForm">
          <div class="form-group">
            <div class="input-group">
              <span class="input-icon">👤</span>
              <input type="text" id="username" placeholder="请输入用户名" required>
            </div>
          </div>
          
          <div class="form-group">
            <div class="input-group">
              <span class="input-icon">🔒</span>
              <input type="password" id="password" placeholder="请输入密码" required>
            </div>
          </div>
          
          <div class="error-msg" id="errorMsg"></div>
          
          <div class="remember-row">
            <label class="remember-me">
              <input type="checkbox" id="rememberMe">
              <span>记住密码</span>
            </label>
          </div>
          
          <button type="submit" class="btn-login" id="loginBtn">
            登 录
          </button>
        </form>
        
        <div class="demo-hint">
          演示账号：<strong>admin</strong> / 密码：<strong>admin123</strong>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Check if already logged in
    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('ogadmin_loggedIn') === 'true') {
        location.href = 'main.html';
        return;
      }
      
      // Fill remembered credentials
      const savedUser = localStorage.getItem('ogadmin_username');
      if (savedUser) {
        document.getElementById('username').value = savedUser;
        document.getElementById('rememberMe').checked = true;
      }
    });

    function showError(msg) {
      const errorEl = document.getElementById('errorMsg');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      setTimeout(() => { errorEl.style.display = 'none'; }, 3000);
    }

    function setLoading(loading) {
      const btn = document.getElementById('loginBtn');
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>登录中...';
      } else {
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    }

    function validateLogin(username, password) {
      if (username === 'admin' && password === 'admin123') {
        return { success: true, realName: '系统管理员' };
      }
      if (username && password) {
        return { success: true, realName: username };
      }
      return { success: false, message: '用户名或密码错误' };
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('errorMsg').style.display = 'none';
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      if (!username) { showError('请输入用户名'); return; }
      if (!password) { showError('请输入密码'); return; }

      setLoading(true);
      await new Promise(resolve => setTimeout(resolve, 800));

      const result = validateLogin(username, password);

      if (result.success) {
        localStorage.setItem('ogadmin_loggedIn', 'true');
        localStorage.setItem('ogadmin_user', username);
        localStorage.setItem('ogadmin_realName', result.realName);
        
        if (rememberMe) {
          localStorage.setItem('ogadmin_username', username);
        } else {
          localStorage.removeItem('ogadmin_username');
        }

        const btn = document.getElementById('loginBtn');
        btn.innerHTML = '✓ 登录成功';
        
        setTimeout(() => { location.href = 'main.html'; }, 300);
      } else {
        setLoading(false);
        showError(result.message || '登录失败');
      }
    });

    // Clear error on input
    ['username', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById('errorMsg').style.display = 'none';
      });
    });
  </script>
</body>
</html>
