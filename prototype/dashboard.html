<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OG.Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="p-4">
  <div class="container-fluid">
    <div class="row">
      <div class="col">
        <h3>Welcome to OG.Admin</h3>
        <p class="text-muted">This is a static prototype dashboard.</p>
        <div class="row g-3 mt-2">
          <div class="col-md-4">
            <div class="card p-3 border-primary border-2 h-100"><strong>Users</strong><div class="text-muted">Total: 12</div></div>
          </div>
          <div class="col-md-4">
            <div class="card p-3 border-success border-2 h-100"><strong>Organizations</strong><div class="text-muted">Total: 4</div></div>
          </div>
          <div class="col-md-4">
            <div class="card p-3 border-warning border-2 h-100"><strong>Menus</strong><div class="text-muted">Total: 8</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
