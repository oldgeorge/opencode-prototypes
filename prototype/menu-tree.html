<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OG.Admin - Menu Tree</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="p-3">
  <div class="container-fluid">
    <div class="card">
      <div class="card-header">Menu Tree</div>
      <div class="card-body">
        <ul class="tree" id="menuTree" style="padding-left:0;">
          <li>Dashboard</li>
          <li>Settings
            <ul class="tree-children" style="padding-left:20px;">
              <li>General</li>
              <li>Security</li>
              <li>Integrations</li>
            </ul>
          </li>
          <li>Navigation
            <ul class="tree-children" style="padding-left:20px;">
              <li>Top Bar</li>
              <li>Side Menu</li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </div>
  <script>
    // Simple toggle for menu sections
    document.addEventListener('DOMContentLoaded', () => {
      const tree = document.getElementById('menuTree');
      tree.querySelectorAll('li').forEach(li => {
        const sub = li.querySelector('ul');
        if (sub) {
          li.style.cursor = 'pointer';
          li.addEventListener('click', (e) => {
            if (e.target !== li) return;
            sub.style.display = sub.style.display === 'none' ? 'block' : 'none';
          });
          sub.style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
