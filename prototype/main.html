<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OG.Admin - Main</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script defer src="main.js"></script>
</head>
<body>
  <nav class="navbar navbar-light bg-light border-bottom mb-0">
    <div class="container-fluid">
      <a class="navbar-brand logo" href="#">OG.Admin</a>
      <div class="d-flex align-items-center">
        <span class="text-muted me-2">Welcome, <strong id="userNameTop">Guest</strong></span>
        <button id="logoutBtn" class="btn btn-sm btn-outline-secondary">Logout</button>
      </div>
    </div>
  </nav>
  <div class="container-fluid p-0">
    <div class="row no-gutters" style="min-height: calc(100vh - 56px);">
      <aside class="col-3 border-end p-0 bg-light" id="sidebarArea" style="min-height:100vh;">
        <div class="p-3 border-bottom">
          <strong>Navigation</strong>
        </div>
        <ul class="tree" id="treeMenu" style="padding:0; margin:0;">
          <li class="tree-item" data-src="dashboard.html">Dashboard</li>
          <li class="tree-section">
            <div class="section-title">Administration</div>
            <ul class="tree-children">
              <li class="tree-item" data-src="user-list.html">User List</li>
              <li class="tree-item" data-src="org-tree.html">Org Tree</li>
              <li class="tree-item" data-src="menu-tree.html">Menu Tree</li>
              <li class="tree-item" data-src="role-list.html">Role List</li>
            </ul>
          </li>
        </ul>
      </aside>
      <main class="col-9 p-2">
        <div id="tabs" class="d-flex flex-wrap align-items-center" style="gap:6px; padding:6px; border-bottom:1px solid #dee2e6; overflow:auto; white-space: nowrap;"></div>
        <iframe id="contentFrame" src="dashboard.html"></iframe>
      </main>
    </div>
  </div>
  <script>
    // Initialize: set username from localStorage
    document.addEventListener('DOMContentLoaded', () => {
      const user = localStorage.getItem('ogadmin_user') || 'Guest';
      document.getElementById('userNameTop').textContent = user;
      document.getElementById('userNameTop').textContent = user;
      // Bind logout
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('ogadmin_loggedIn');
        localStorage.removeItem('ogadmin_user');
        location.href = 'login.html';
      });
    });
  </script>
</body>
</html>
