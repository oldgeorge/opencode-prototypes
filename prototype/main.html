<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OG.Admin - 管理后台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script defer src="main.js"></script>
</head>
<body>
  <!-- Header -->
  <header class="navbar">
    <div class="d-flex align-items-center gap-3">
      <button class="mobile-nav-btn btn" id="menuToggleBtn" onclick="toggleSidebar()" style="display:none;">
        ☰ 菜单
      </button>
      <span class="logo">OG.Admin</span>
    </div>
    <div class="d-flex align-items-center gap-3">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">管</div>
        <span id="userNameTop">访客</span>
      </div>
      <button id="logoutBtn" class="btn btn-outline">退出</button>
    </div>
  </header>
  
  <!-- Mobile Overlay -->
  <div class="menu-overlay" id="menuOverlay" onclick="toggleSidebar()"></div>
  
  <!-- Main Container -->
  <div class="main-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebarArea">
      <nav class="menu">
        <div class="menu-section">
          <div class="menu-section-title">导航</div>
          <div class="menu-item active" data-src="dashboard.html">
            <span class="icon">📊</span>
            <span>工作台</span>
          </div>
        </div>
        
        <div class="menu-section open">
          <div class="menu-section-title">系统管理</div>
          <div class="menu-item" data-src="user-list.html" onclick="navigateTo('user-list.html', this)">
            <span class="icon">👥</span>
            <span>用户管理</span>
          </div>
          <div class="menu-item" data-src="org-tree.html" onclick="navigateTo('org-tree.html', this)">
            <span class="icon">🏢</span>
            <span>组织管理</span>
          </div>
          <div class="menu-item" data-src="menu-tree.html" onclick="navigateTo('menu-tree.html', this)">
            <span class="icon">📋</span>
            <span>菜单管理</span>
          </div>
          <div class="menu-item" data-src="role-list.html" onclick="navigateTo('role-list.html', this)">
            <span class="icon">🔐</span>
            <span>角色管理</span>
          </div>
        </div>
      </nav>
    </aside>
    
    <!-- Content Area -->
    <main class="content-area">
      <!-- Tabs -->
      <div class="tabs" id="tabs">
        <div class="tab active" data-src="dashboard.html" onclick="switchTab('dashboard.html', this)">
          📊 工作台
        </div>
      </div>
      
      <!-- Iframe -->
      <iframe class="content-iframe" id="contentFrame" src="dashboard.html"></iframe>
    </main>
  </div>

  <script>
    // Mobile menu toggle
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebarArea');
      const overlay = document.getElementById('menuOverlay');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('show');
    }

    // Navigate to page
    function navigateTo(page, el) {
      // Update active menu item
      document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
      el.classList.add('active');
      
      // Switch tab
      switchTab(page, null);
      
      // Close mobile sidebar
      toggleSidebar();
    }

    // Switch tab
    function switchTab(page, el) {
      const tabs = document.getElementById('tabs');
      const frame = document.getElementById('contentFrame');
      
      // Check if tab already exists
      let existingTab = document.querySelector(`.tab[data-src="${page}"]`);
      
      if (!existingTab) {
        // Create new tab
        const pageName = page.replace('.html', '');
        const names = {
          'dashboard': '📊 工作台',
          'user-list': '👥 用户管理',
          'org-tree': '🏢 组织管理',
          'menu-tree': '📋 菜单管理',
          'role-list': '🔐 角色管理'
        };
        
        const newTab = document.createElement('div');
        newTab.className = 'tab fade-in';
        newTab.dataset.src = page;
        newTab.innerHTML = `${names[pageName] || page} <span class="close" onclick="closeTab(event, '${page}')">✕</span>`;
        newTab.onclick = function() { switchTab(page, this); };
        tabs.appendChild(newTab);
        existingTab = newTab;
      }
      
      // Update active tab
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      existingTab.classList.add('active');
      
      // Load page
      frame.src = page;
    }

    // Close tab
    function closeTab(event, page) {
      event.stopPropagation();
      const tab = document.querySelector(`.tab[data-src="${page}"]`);
      if (tab) {
        tab.remove();
        // If this was active tab, switch to dashboard
        if (tab.classList.contains('active')) {
          document.querySelector('.tab').click();
        }
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      // Check login
      if (localStorage.getItem('ogadmin_loggedIn') !== 'true') {
        location.href = 'login.html';
        return;
      }
      
      // Show user name
      const user = localStorage.getItem('ogadmin_realName') || localStorage.getItem('ogadmin_user') || '访客';
      document.getElementById('userNameTop').textContent = user;
      document.getElementById('userAvatar').textContent = user.charAt(0);
      
      // Handle menu clicks
      document.querySelectorAll('.menu-item[data-src]').forEach(item => {
        item.addEventListener('click', function(e) {
          if (this.querySelector('.arrow')) return; // Skip section toggle
          navigateTo(this.dataset.src, this);
        });
      });
      
      // Logout
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('ogadmin_loggedIn');
        localStorage.removeItem('ogadmin_user');
        localStorage.removeItem('ogadmin_realName');
        location.href = 'login.html';
      });
    });
  </script>
</body>
</html>
