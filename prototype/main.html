<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OG.Admin - 管理后台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script defer src="main.js"></script>
  <style>
    .logout-btn:hover {
      background-color: #fee;
      color: #c00;
      border-color: #fcc;
    }
    .user-info {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-light bg-light border-bottom mb-0">
    <div class="container-fluid">
      <a class="navbar-brand logo" href="#">OG.Admin</a>
      <div class="d-flex align-items-center gap-3">
        <span class="user-info">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <strong id="userNameTop">访客</strong>
        </span>
        <button id="logoutBtn" class="btn btn-sm logout-btn">退出登录</button>
      </div>
    </div>
  </nav>
  <div class="container-fluid p-0">
    <div class="row no-gutters" style="min-height: calc(100vh - 56px);">
      <aside class="col-3 border-end p-0 bg-light" id="sidebarArea" style="min-height:100vh;">
        <div class="p-3 border-bottom">
          <strong>导航菜单</strong>
        </div>
        <ul class="tree" id="treeMenu" style="padding:0; margin:0;">
          <li class="tree-item" data-src="dashboard.html">📊 工作台</li>
          <li class="tree-section">
            <div class="section-title">系统管理</div>
            <ul class="tree-children">
              <li class="tree-item" data-src="user-list.html">👥 用户管理</li>
              <li class="tree-item" data-src="org-tree.html">🏢 组织管理</li>
              <li class="tree-item" data-src="menu-tree.html">📋 菜单管理</li>
              <li class="tree-item" data-src="role-list.html">🔐 角色管理</li>
            </ul>
          </li>
        </ul>
      </aside>
      <main class="col-9 p-2">
        <div id="tabs" class="d-flex flex-wrap align-items-center" style="gap:6px; padding:6px; border-bottom:1px solid #dee2e6; overflow:auto; white-space: nowrap;"></div>
        <iframe id="contentFrame" src="dashboard.html"></iframe>
      </main>
    </div>
  </div>
  <script>
    // 初始化：从localStorage获取用户名
    document.addEventListener('DOMContentLoaded', () => {
      // 检查是否已登录，未登录则跳转登录页
      if (localStorage.getItem('ogadmin_loggedIn') !== 'true') {
        location.href = 'login.html';
        return;
      }
      
      const user = localStorage.getItem('ogadmin_realName') || localStorage.getItem('ogadmin_user') || '访客';
      document.getElementById('userNameTop').textContent = user;
      
      // 退出登录
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('ogadmin_loggedIn');
        localStorage.removeItem('ogadmin_user');
        localStorage.removeItem('ogadmin_realName');
        location.href = 'login.html';
      });
    });
  </script>
</body>
</html>
